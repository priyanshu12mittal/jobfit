server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/jobfit
    username: ${DB_USERNAME:jobfit}
    password: ${DB_PASSWORD:jobfit_secret}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
