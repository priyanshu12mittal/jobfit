name: JobFit CD (Docker Publish)

on:
  push:
    branches: [ "main" ]

# Sets permissions of the GITHUB_TOKEN to allow pushing to GitHub Packages
permissions:
  packages: write
  contents: read

jobs:
  push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    
    # We want this to run ONLY if the CI checks (tests/lints) pass.
    # Since they are in a different workflow file, a common pattern is to just run
    # this on merge to main, assuming branch protection rules require CI to pass first.
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Convert repo name to lowercase because Docker image names must be lowercase
      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # ── 1. AI Service ────────────────────────────────────────────────────────
      - name: Build & Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/ai-service:latest

      # ── 2. Orchestrator ──────────────────────────────────────────────────────
      - name: Build & Push Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/orchestrator:latest

      # ── 3. Frontend ──────────────────────────────────────────────────────────
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
          build-args: |
            # We don't know the exact production URL yet, so we default to the container name
            ORCHESTRATOR_URL=http://orchestrator:8081
