<style>
        body {
            background-color: #E8DEC8; /* Stub background */
            /* Subtle grain effect */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .perforated-border {
            border-bottom: 2px dashed #887273;
        }

        /* Slam Animation */
        @keyframes slam {
            0% {
                transform: scale(1.5) rotate(-5deg);
                opacity: 0;
            }
            70% {
                transform: scale(0.95) rotate(2deg);
                opacity: 1;
            }
            85% {
                transform: scale(1.02) rotate(-1deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
            20%, 40%, 60%, 80% { transform: translateX(2px); }
        }

        .animate-slam {
            animation: slam 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0; /* Starts hidden */
        }
        
        .slam-impact {
            animation: shake 0.3s ease-in-out;
            animation-delay: 0.3s;
        }

        @media (prefers-reduced-motion: reduce) {
            .animate-slam {
                animation: none;
                opacity: 1;
                transform: none;
            }
            .slam-impact {
                animation: none;
            }
        }
        
        .mechanical-button:hover {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative font-body-md text-ink antialiased">
<!-- Top Action Area (Quiet) -->
<div class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-10">

<span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1">arrow_back</span>
            Back to dashboard
        </a>
</div>
<!-- Main Verdict Area -->
<main class="w-full max-w-lg mx-auto px-6 flex flex-col items-center slam-impact gap-12">
<!-- The Stamp Component -->
<div class="animate-slam w-full bg-surface-container-lowest border-4 border-primary-container p-8 relative flex flex-col items-center shadow-[4px_4px_0px_0px_#221F1D]" style="transform-origin: center center;">
<!-- Perforated top stub effect -->
<div class="absolute -top-[10px] left-0 right-0 h-4 flex justify-between px-2 overflow-hidden opacity-30">
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
<div class="w-2 h-2 rounded-full bg-stub mt-1"></div>
</div>
<!-- Stamp Header -->
<h2 class="font-headline-md text-headline-md text-primary-container uppercase tracking-wide mb-6 text-center italic border-b-2 border-primary-container/20 pb-4 w-full">
                Certificate of Fit
            </h2>
<!-- Stamp Score -->
<div class="font-utility-sm text-[80px] leading-[80px] font-bold text-ink mb-6 tracking-tighter">
                82 <span class="text-3xl text-ink/40 font-normal">/ 100</span>
</div>
<!-- Stamp Footer/Details -->
<p class="font-body-md text-body-md text-ink/80 text-center max-w-[280px]">
                Strong match — <span class="font-semibold">2 gaps</span> to close before applying.
            </p>
<!-- Vintage seal detail -->
<div class="absolute bottom-4 right-4 opacity-20">
<span class="material-symbols-outlined text-4xl" data-weight="fill">verified</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 w-full justify-center max-w-sm mx-auto opacity-0" style="animation: fadeIn 0.5s ease 0.6s forwards;">
<style>
                @keyframes fadeIn { to { opacity: 1; } }
            </style>
<button class="mechanical-button flex-1 py-3 px-6 border border-ink/40 font-utility-sm text-utility-sm text-ink hover:bg-ink/5 transition-all flex justify-center items-center gap-2">
                View suggested bullets
            </button>
<button class="mechanical-button flex-1 py-3 px-6 bg-primary-container font-utility-sm text-utility-sm text-on-primary hover:bg-[#8A2B3C] transition-all flex justify-center items-center gap-2 shadow-[2px_2px_0px_0px_#221F1D]">
<span class="material-symbols-outlined text-sm">bookmark</span>
                Save to tracker
            </button>
</div>
</main>
